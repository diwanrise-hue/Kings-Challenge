<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="theme-color" content="#050507">
    <link class="apple-touch-icon" href="1000127272.webp">
    
    <title>Dama Challenge - Premium Hub</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    
    <script src="https://diwanrise-dama-game-diwan.hf.space/socket.io/socket.io.js"></script>

    <style>
        /* ========================================== */
        /* المتغيرات والتصميم النظيف (Clean)   */
        /* ========================================== */
        :root {
            --bg-deep: #050507;
            --glass-bg: rgba(25, 25, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            
            --accent: #f5a623; /* لون ذهبي أنيق */
            --danger: #ff453a;
            --success: #34c759;
            
            --radius-pill: 50px;
            --radius-card: 24px;
            
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        html[lang="ar"] { font-family: 'Tajawal', sans-serif; }
        html[lang="en"] { font-family: 'Outfit', sans-serif; }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 50% 0%, #1a1a24 0%, var(--bg-deep) 80%);
            color: var(--text-primary);
            overflow: hidden; 
            -webkit-font-smoothing: antialiased;
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        /* تأثيرات الدخول الناعمة */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========================================== */
        /* شاشة الافتتاحية              */
        /* ========================================== */
        #splash-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg-deep); z-index: 99999; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center; 
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        #splash-screen svg { fill: var(--accent); width: 60px; height: 60px; margin-bottom: 20px; }
        #splash-screen h1 { 
            font-size: 24px; font-weight: 800; margin: 0; 
            letter-spacing: 3px; color: var(--text-primary);
        }

        /* ========================================== */
        /* المنصة الرئيسية               */
        /* ========================================== */
        #game-selector { 
            display: none; width: 100%; height: 100%; 
            flex-direction: column; justify-content: center; align-items: center; gap: 40px; 
            position: absolute; top: 0; left: 0; z-index: 10;
        }

        /* الشريط العلوي */
        .top-hud {
            position: absolute; top: 30px; left: 25px; right: 25px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 20;
        }
        .hud-group { display: flex; align-items: center; gap: 12px; }

        /* الأفتار الدائري النظيف */
        .profile-avatar { 
            width: 46px; height: 46px; border-radius: 50%; 
            background: var(--glass-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; overflow: hidden; transition: var(--transition);
        }
        .profile-avatar:hover { transform: scale(1.05); border-color: rgba(255,255,255,0.2); }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        /* كبسولة التوكنات الانسيابية */
        .hub-token-badge {
            height: 46px; background: var(--glass-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-radius: var(--radius-pill); 
            display: flex; align-items: center; padding: 0 20px; 
            color: var(--accent); font-weight: 600; font-size: 15px; 
            direction: ltr; transition: var(--transition); gap: 8px;
        }

        /* زر اللغة والراديو */
        .lang-btn {
            height: 46px; width: 46px; background: var(--glass-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: var(--text-primary);
            font-weight: 500; font-size: 16px; cursor: pointer; transition: var(--transition);
        }
        .lang-btn:hover { background: rgba(255,255,255,0.08); }

        /* تأثير التوهج الملوكي عند عمل الإذاعة */
        .music-playing {
            border-color: var(--accent) !important;
            color: var(--accent) !important;
            animation: radioGlow 2s infinite;
        }
        @keyframes radioGlow {
            0% { box-shadow: 0 0 0 0 rgba(245, 166, 35, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(245, 166, 35, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 166, 35, 0); }
        }
        .radio-active {
            background: var(--accent) !important;
            color: #000 !important;
            border-color: var(--accent) !important;
        }

        /* تخصيص وتكبير نافذة الراديو */
        #radio-modal-card {
            max-width: 550px;
            width: 92%;
        }
        .radio-grid-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .radio-grid-row .btn {
            flex: 1;
            min-width: 110px;
            margin-bottom: 0;
            font-size: 14px;
            font-weight: 600;
            padding: 0 10px;
            white-space: nowrap;
        }
        .radio-controls-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        .radio-controls-row .btn {
            flex: 1;
            margin-bottom: 0;
        }

        /* الإطار الزجاجي الجديد للنبض الصوتي المتكامل الفاخر */
        .audio-spectrum-frame {
            width: 100%;
            background: rgba(25, 25, 30, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px 15px;
            margin: 20px 0 10px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .audio-spectrum-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2.5px;
            height: 36px;
            width: 100%;
        }
        .spectrum-bar {
            width: 2px;
            height: 20px;
            background-color: rgba(255, 255, 255, 0.25);
            border-radius: 1px;
            transition: all 0.15s ease-in-out;
        }
        
        /* تفعيل حركة الأمواج المتناسقة الدقيقة */
        .music-playing-bars .spectrum-bar {
            background-color: var(--accent);
            animation: waveBounce 0.8s ease-in-out infinite alternate;
        }
        .music-playing-bars .spectrum-bar:nth-child(2n) { animation-delay: 0.15s; animation-duration: 0.6s; }
        .music-playing-bars .spectrum-bar:nth-child(3n) { animation-delay: 0.3s; animation-duration: 0.9s; }
        .music-playing-bars .spectrum-bar:nth-child(4n) { animation-delay: 0.05s; animation-duration: 0.7s; }
        .music-playing-bars .spectrum-bar:nth-child(5n) { animation-delay: 0.4s; animation-duration: 0.8s; }
        
        @keyframes waveBounce {
            0% { height: 6px; transform: scaleY(0.4); }
            100% { height: 32px; transform: scaleY(1); }
        }

        /* حقل نص اسم الإذاعة التفاعلي */
        .radio-station-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--accent);
            margin-top: 12px;
            min-height: 18px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            transition: var(--transition);
        }

        /* ========================================== */
        /* كروت الألعاب                */
        /* ========================================== */
        .cards-container { display: flex; flex-direction: column; gap: 20px; align-items: center; width: 100%; }

        /* كرت الدامة - تم تقليل الارتفاع إلى 130px */
        .dama-card { 
            width: 85%; max-width: 320px; height: 130px; 
            border-radius: var(--radius-card); cursor: pointer; 
            position: relative; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.1); background: #111;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            transition: var(--transition);
            display: flex; align-items: flex-end; justify-content: center;
        }
        
        .dama-card img.card-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; transition: transform 0.5s ease; z-index: 1;
            opacity: 0.85;
        }
        
        .dama-card::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.2) 50%, transparent 100%);
            z-index: 2;
        }

        .dama-card-content {
            position: relative; z-index: 3; padding-bottom: 20px; text-align: center; width: 100%;
        }
        .dama-card span {
            color: #fff; font-size: 32px; font-weight: 800; 
            letter-spacing: 1px; text-shadow: 0 4px 10px rgba(0,0,0,0.8);
            transition: var(--transition);
        }

        .dama-card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.3); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .dama-card:hover img.card-bg { transform: scale(1.05); opacity: 1; }
        .dama-card:hover span { color: var(--accent); }

        /* كرت (قريباً) */
        .game-card-soon { 
            width: 85%; max-width: 320px; padding: 22px; 
            background: rgba(255,255,255,0.02); color: var(--text-secondary); 
            border-radius: var(--radius-card); text-align: center; 
            border: 1px solid rgba(255,255,255,0.05); cursor: pointer; 
            transition: var(--transition); font-size: 18px; font-weight: 500; 
        }
        .game-card-soon:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }

        /* ========================================== */
        /* واجهة اللعب (Iframe)          */
        /* ========================================== */
        #game-interface { 
            display: none; 
            width: 100vw; 
            height: 100dvh; 
            background: #000; 
            position: fixed; 
            top: 0; 
            left: 0; 
            z-index: 99999; 
        }

        /* ========================================== */
        /* النوافذ المنبثقة (Clean Modals)   */
        /* ========================================== */
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); z-index: 99998; 
            justify-content: center; align-items: center; padding: 20px;
        }
        
        .settings-card { 
            background: #111115; 
            border: 1px solid rgba(255,255,255,0.08); border-radius: 30px; 
            padding: 25px 20px; 
            width: 100%; max-width: 350px; 
            text-align: center; max-height: 95vh; overflow-y: auto; color: white;
            position: relative; animation: fadeIn 0.4s ease-out;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9);
        }
        .settings-card::-webkit-scrollbar { display: none; }

        /* زر الإغلاق الأنيق */
        .modal-close-btn {
            position: absolute; top: 20px; left: 20px; background: transparent; 
            border: none; color: var(--text-secondary); width: 30px; height: 30px; 
            font-size: 18px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: var(--transition);
        }
        .modal-close-btn:hover { color: var(--text-primary); }

        .settings-card h3 { color: var(--text-primary); font-size: 22px; font-weight: 700; margin: 0 0 5px 0; }
        .settings-card p.desc { color: var(--text-secondary); font-size: 13px; margin-bottom: 15px; line-height: 1.5; }

        /* حقول الإدخال */
        .input-group { text-align: start; margin-bottom: 15px; }
        .settings-label { display: block; color: var(--text-secondary); font-size: 13px; font-weight: 500; margin-bottom: 6px; padding: 0 5px; }
        
        .clean-input { 
            width: 100%; height: 46px; 
            padding: 0 20px; border-radius: var(--radius-pill); 
            border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); 
            color: var(--text-primary); font-weight: 500; font-size: 15px; 
            transition: var(--transition);
        }
        .clean-input:focus { border-color: var(--accent); background: rgba(255,255,255,0.06); }
        .clean-input::placeholder { color: rgba(255,255,255,0.2); }

        select.clean-input { 
            appearance: none; 
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='rgba(255,255,255,0.5)' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); 
            background-repeat: no-repeat; background-position: left 1.2rem center; background-size: 1em; 
        }
        html[dir="ltr"] select.clean-input { background-position: right 1.2rem center; }
        select.clean-input option { background: #111; color: white; }

        /* الأزرار الانسيابية */
        .btn { 
            width: 100%; height: 46px; border: none; border-radius: var(--radius-pill); 
            font-weight: 600; font-size: 15px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: var(--transition); margin-bottom: 10px;
        }
        .btn:active { transform: scale(0.97); }
        
        .btn-primary { background: var(--text-primary); color: #000; }
        .btn-primary:hover { opacity: 0.9; }
        
        .btn-secondary { background: rgba(255,255,255,0.08); color: var(--text-primary); border: 1px solid rgba(255,255,255,0.05); }
        .btn-secondary:hover { background: rgba(255,255,255,0.12); }
        
        .btn-danger { background: rgba(255, 69, 58, 0.1); color: var(--danger); border: 1px solid rgba(255, 69, 58, 0.2); }
        .btn-danger:hover { background: rgba(255, 69, 58, 0.2); }

        /* ========================================== */
        /* تنسيقات نافذة الملف الشخصي            */
        /* ========================================== */
        .profile-display-avatar {
            width: 85px; height: 85px; margin: 0 auto 15px auto; 
            border-radius: 50%; padding: 3px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .profile-display-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        
        #profile-display-name { color: var(--text-primary); margin: 0 0 5px 0; font-size: 24px; font-weight: 700; }
        
        .profile-id-box { 
            font-size: 14px; margin-bottom: 30px; color: var(--text-secondary);
        }
        #profile-display-id { color: var(--text-primary); font-weight: 500; cursor: pointer; transition: var(--transition); padding: 5px; }
        #profile-display-id:hover { color: var(--accent); }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 30px; }
        .action-grid .btn { height: 48px; font-size: 13px; font-weight: 500; margin: 0; }
        .action-grid .full-width { grid-column: span 2; }

        .stats-box { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 20px; padding: 20px; 
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px;
        }
        .stats-box span:first-child { color: var(--text-secondary); font-size: 14px; font-weight: 500; }
        .stats-box span:last-child { color: var(--accent); font-size: 20px; font-weight: 700; }

        .bottom-actions { display: flex; gap: 10px; }
        .bottom-actions .btn { height: 48px; margin: 0; font-size: 14px; }

        /* نافذة التنبيهات المخصصة */
        #custom-popup-modal .settings-card { padding: 35px 25px; border: 1px solid rgba(255,255,255,0.1); }
        #custom-popup-msg { font-size: 15px; font-weight: 500; color: var(--text-primary); line-height: 1.6; margin-bottom: 25px; }

        /* نمط رابط التبديل المطور لنموذج التسجيل */
        .auth-toggle-link {
            display: inline-block; margin-top: 5px; font-size: 13px; font-weight: 600;
            color: var(--accent); cursor: pointer; transition: var(--transition); text-decoration: none;
        }
        .auth-toggle-link:hover { opacity: 0.8; transform: translateY(-1px); }

    </style>
</head>
<body>

    <div id="splash-screen">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 16L3 5L8.5 10L12 4L15.5 10L21 5L19 16H5ZM5 18H19V20H5V18Z"/>
        </svg>
        <h1 data-i18n="app_title">DAMA CHALLENGE</h1>
    </div>

    <div id="game-selector">
        <div class="top-hud">
            <div class="hud-group">
                <div class="profile-avatar" id="hub-profile-avatar" onclick="openProfileModal()"></div>
                <div class="hub-token-badge">
                    🪙 <span id="hub-token-count">0</span>
                </div>
            </div>
            <div style="display: flex; gap: 12px; align-items: center;">
                <!-- زر راديو إيموجي مباشر ومبسط -->
                <div class="lang-btn" onclick="openRadioModal()" id="music-toggle-btn" title="الراديو والموسيقى">📻</div>
                <div class="lang-btn" onclick="toggleLanguage()" id="lang-toggle-btn">EN</div>
            </div>
        </div>

        <div class="cards-container">
            <div class="dama-card" onclick="startGame()">
                <img src="1000138342.webp" alt="Dama Game" class="card-bg">
                <div class="dama-card-content">
                    <span id="dama-title-text" data-i18n="dama">دامة</span>
                </div>
            </div>
            
            <div class="game-card-soon" onclick="triggerAlertSoon()" data-i18n="soon">قريباً</div>
        </div>
    </div>

    <!-- عنصر الراديو الصوتي المخفي لتبسيط إدارة التدفق -->
    <audio id="bg-music"></audio>

    <div id="game-interface">
        <iframe id="game-frame" src="" allowfullscreen allow="fullscreen" style="width: 100%; height: 100%; border: none; border-radius: 0;"></iframe>
    </div>

    <div id="custom-popup-modal" class="modal-overlay" style="z-index: 99999;">
        <div class="settings-card" dir="auto" style="max-width: 300px;">
            <p id="custom-popup-msg"></p>
            <div class="input-group" id="custom-popup-input-group" style="display: none; margin-bottom: 25px;">
                <input type="text" id="custom-popup-input" class="clean-input" style="text-align: center;">
            </div>
            <div style="display: flex; gap: 10px; width: 100%;">
                <button id="custom-popup-ok" class="btn btn-primary" style="flex: 1; margin:0;" data-i18n="btn_ok">حسناً</button>
                <button id="custom-popup-cancel" class="btn btn-secondary" style="flex: 1; display: none; margin:0;" data-i18n="btn_cancel">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- نافذة تحكم الراديو المنبثقة الجمالية العريضة والمطورة بعد التبسيط -->
    <div id="radio-modal" class="modal-overlay">
        <div class="settings-card" id="radio-modal-card" dir="auto">
            <button class="modal-close-btn" onclick="closeRadioModal()">✕</button>
            <h3 data-i18n="radio_title" style="margin-bottom: 25px;">الراديو والموسيقى</h3>
            
            <!-- أزرار الأصناف المبسطة مصفوفة بجانب بعضها البعض -->
            <div class="radio-grid-row">
                <button onclick="playRadio('https://yayin6.radyohizmeti.com:7050/;stream', 'kurdish')" class="btn btn-secondary" id="btn-radio-kurdish" data-i18n="radio_kurdish">الكردية</button>
                <button onclick="playRadio('https://stream.zeno.fm/67v6u6cc10etv', 'arabic')" class="btn btn-secondary" id="btn-radio-arabic" data-i18n="radio_arabic">العربية</button>
                <button onclick="playRadio('https://stream.zeno.fm/f3wvbbv8ca0uv', 'english')" class="btn btn-secondary" id="btn-radio-english" data-i18n="radio_english">الإنجليزية</button>
            </div>

            <!-- أزرار التشغيل والإيقاف متراصفة أفقياً -->
            <div class="radio-controls-row">
                <button onclick="resumeRadio()" class="btn btn-primary" id="btn-radio-resume" style="background: var(--success); color: white;" data-i18n="radio_resume">▶️ تشغيل</button>
                <button onclick="stopRadio()" class="btn btn-danger" data-i18n="radio_stop">🛑 إيقاف الراديو</button>
            </div>

            <!-- إطار زجاجي داكن يحتوي على خطوط النبض العريضة المتلاصقة واسم الإذاعة الحالية -->
            <div class="audio-spectrum-frame">
                <div class="audio-spectrum-container" id="audio-spectrum">
                    <!-- تم تكرار الأعمدة لتوليد خط تموج ممتد عريض وجميل ومكتظ يحاكي اللقطة المرفقة -->
                    <div class="spectrum-bar"></div><div class="spectrum-bar"></div><div class="spectrum-bar"></div><div class="spectrum-bar"></div>
                    <div class="spectrum-bar"></div><div class="spectrum-bar"></div><div class="spectrum-bar"></div><div class="spectrum-bar"></div>
                    <div class="spectrum-bar"></div><div class="spectrum-bar"></div><div class="spectrum-bar"></div><div class="spectrum-bar"></div>
                    <div class="spectrum-bar"></div><div class="spectrum-bar"></div><div class="spectrum-bar"></div><div class="spectrum-bar"></div>
                    <div class="spectrum-bar"></div><div class="spectrum-bar"></div><div class="spectrum-bar"></div><div class="spectrum-bar"></div>
                    <div class="spectrum-bar"></div><div class="spectrum-bar"></div><div class="spectrum-bar"></div><div class="spectrum-bar"></div>
                    <div class="spectrum-bar"></div><div class="spectrum-bar"></div><div class="spectrum-bar"></div><div class="spectrum-bar"></div>
                    <div class="spectrum-bar"></div><div class="spectrum-bar"></div><div class="spectrum-bar"></div><div class="spectrum-bar"></div>
                </div>
                <!-- مكان ظهور اسم الإذاعة المباشر والحي التفاعلي -->
                <div class="radio-station-title" id="radio-station-title-display"></div>
            </div>
        </div>
    </div>

    <div id="login-modal" class="modal-overlay">
        <div class="settings-card" dir="auto">

    <!-- ربط السكريبت البرمجي الخارجي المنفصل للراديو هنا -->

    <script>

                msg_img_success: "Image set successfully.",

            }
        };

        let currentLang = 'ar';
        let isLoginMode = false; 

        // === متغيرات وإعدادات الراديو الأساسية ===
        let isMusicPlaying = false;
        let currentRadioId = localStorage.getItem('hub_radio_id') || '';

        // 🔌 الاتصال الخارجي بالسيرفر المحرك للعبة (Hugging Face)
        const socket = io('https://diwanrise-dama-game-diwan.hf.space/dama', { transports: ['websocket', 'polling'] });

        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'SYNC_PROFILE') {
                syncHubProfile();
            }
        });

        socket.on('disconnect', (reason) => {
            console.warn('انقطع الاتصال:', reason);
            const errorMsg = currentLang === 'ar' 
                ? "⚠️ عذراً، انقطع الاتصال بالخادم أو الإنترنت ضعيف. يرجى الانتظار، جاري محاولة إعادة الاتصال..." 
                : "⚠️ Connection lost. Server is down or internet is weak. Reconnecting...";
            
            showCustomPopup(errorMsg, false, "", false);
        });

        socket.on('connect', () => {
            console.log('تم الاتصال بالسيرفر بنجاح!');
            if (document.getElementById('custom-popup-modal').style.display === 'flex') {
                closeCustomPopup(true);
            }
        });

        function getSafeProfile() {
            const defaultProfile = {
                id: "GUEST-DEFAULT",
                name: currentLang === 'ar' ? "زائر" : "Guest",
                avatar: '1000132081.webp',
                isCustomAvatar: false,
                tokens: 0,
                gamesPlayed: 0,
                wins: 0,
                losses: 0,
                friends: [],
                purchasedItems: [],
                equippedBg: 'bg_wood',
                equippedFr: 'fr_classic',
                equippedPc: 'pc_original'
            };

            try {
                const profileRaw = localStorage.getItem('hub_user_profile');
                if (!profileRaw) return defaultProfile;
                
                const parsed = JSON.parse(profileRaw);
                if (parsed && typeof parsed === 'object') {
                    return parsed;
                }
            } catch (e) {
                console.error("🔒 خطأ في معالجة بيانات الملف الشخصي المحفوظة:", e);
            }
            return defaultProfile;
        }

        socket.on('auth_success', (data) => {
            const msg = safeParseAuthMessage(data.message);
            showCustomPopup(msg);
            
            localStorage.setItem('hub_user_profile', JSON.stringify(data.profile));
            
            if(document.getElementById('profile-modal').style.display === 'flex') {
                syncHubProfile();
            } else {
                checkUserAuthentication();
            }
        });

        socket.on('auth_failed', (data) => {
            const msg = safeParseAuthMessage(data.message);
            showCustomPopup(msg);
        });

        function loginWithFacebook() {
            if (typeof FB === 'undefined') {
                showCustomPopup(currentLang === 'ar' ? "جاري الاتصال بخوادم فيسبوك، جرب مرة أخرى." : "Connecting to Facebook, try again.");
                return;
            }

            if (!socket || !socket.connected) {
                console.warn("⚠️ السوكيت غير متصل حالياً! جاري إعادة الاتصال تلقائياً...");
                showCustomPopup(currentLang === 'ar' ? "فشل الاتصال المؤقت بالسيرفر! جاري إعادة الاتصال، يرجى المحاولة مرة أخرى خلال ثوانٍ." : "Server connection lost! Reconnecting, please try again in a few seconds.");
                socket.connect(); 
                return;
            }

            FB.login(function(response) {
                if (response.authResponse) {
                    const accessToken = response.authResponse.accessToken;
                    socket.emit('login_facebook', { accessToken: accessToken });
                }
            }); 
        }

        function linkGuestWithFacebook() {
            if (typeof FB === 'undefined') {
                showCustomPopup(currentLang === 'ar' ? "جاري الاتصال بخوادم فيسبوك، جرب مرة أخرى." : "Connecting to Facebook, try again.");
                return;
            }

            if (!socket || !socket.connected) {
                console.warn("⚠️ السوكيت غير متصل حالياً! جاري إعادة الاتصال تلقائياً...");
                showCustomPopup(currentLang === 'ar' ? "فشل الاتصال المؤقت بالسيرفر! جاري إعادة الاتصال، يرجى المحاولة مرة أخرى خلال ثوانٍ." : "Server connection lost! Reconnecting, please try again in a few seconds.");
                socket.connect(); 
                return;
            }

            FB.login(function(response) {
                if (response.authResponse) {
                    const accessToken = response.authResponse.accessToken;
                    const profile = getSafeProfile();
                    socket.emit('link_facebook', { 
                        accessToken: accessToken, 
                        guestId: profile.id 
                    });
                }
            }); 
        }

        function safeParseAuthMessage(msgStr) {
            if (typeof msgStr === 'string' && msgStr.startsWith('{')) {
                try {
                    const parsed = JSON.parse(msgStr);
                    return currentLang === 'ar' ? parsed.ar : parsed.en;
                } catch(e) { return msgStr; }
            }
            return msgStr;
        }

        // === وظائف إدارة الراديو المضافة والمطورة لـ radio.js ومحاذاة التسميات ===
        function openRadioModal() {
            document.getElementById('radio-modal').style.display = 'flex';
            updateRadioButtonsUI();
            history.pushState({ view: 'radio' }, '');
        }

        document.getElementById('radio-modal').addEventListener('click', function(e) {
            if (e.target === this) closeRadioModal();
        });

        function closeRadioModal() {
            if (history.state && history.state.view === 'radio') { history.back(); }
            else { document.getElementById('radio-modal').style.display = 'none'; }
        }

        function playRadio(url, id) {
            const audioEl = document.getElementById('bg-music');
            const musicBtn = document.getElementById('music-toggle-btn');
            const spectrumEl = document.getElementById('audio-spectrum');
            const titleDisplay = document.getElementById('radio-station-title-display');
            
            audioEl.src = url;
            audioEl.play().then(() => {
                isMusicPlaying = true;
                if (musicBtn) musicBtn.classList.add('music-playing');
                if (spectrumEl) spectrumEl.classList.add('music-playing-bars');
                
                localStorage.setItem('hub_radio_url', url);
                localStorage.setItem('hub_radio_id', id);
                localStorage.setItem('hub_music_enabled', 'true');
                
                currentRadioId = id;
                updateRadioButtonsUI();

                // طباعة الاسم المطابق بدقة لتعريفات ملف radio.js
                if (titleDisplay) {
                    if (id === 'kurdish') titleDisplay.innerText = "فۆلکلۆری کوردی";
                    else if (id === 'arabic') titleDisplay.innerText = "إذاعة عربية (طرب)";
                    else if (id === 'english') titleDisplay.innerText = "إذاعة أجنبية (Lofi)";
                }
            }).catch(e => {
                console.error("Radio Playback failed", e);
                showCustomPopup(currentLang === 'ar' ? "عذراً، فشل الاتصال بالإذاعة. تأكد من اتصالك بالإنترنت." : "Failed to connect to the radio stream. Check your connection.");
            });
        }

        // دالة تشغيل / استئناف الراديو بناءً على آخر إذاعة تم حفظها
        function resumeRadio() {
            const savedRadioUrl = localStorage.getItem('hub_radio_url');
            const savedRadioId = localStorage.getItem('hub_radio_id');
            
            if (savedRadioUrl && savedRadioId) {
                playRadio(savedRadioUrl, savedRadioId);
            } else {
                // تشغيل الإذاعة الافتراضية إذا لم يكن هناك شيء محفوظ مسبقاً
                playRadio('https://yayin6.radyohizmeti.com:7050/;stream', 'kurdish');
            }
        }

        function stopRadio() {
            const audioEl = document.getElementById('bg-music');
            const musicBtn = document.getElementById('music-toggle-btn');
            const spectrumEl = document.getElementById('audio-spectrum');
            const titleDisplay = document.getElementById('radio-station-title-display');
            
            audioEl.pause();
            audioEl.src = '';
            isMusicPlaying = false;
            
            if (musicBtn) musicBtn.classList.remove('music-playing');
            if (spectrumEl) spectrumEl.classList.remove('music-playing-bars');
            if (titleDisplay) titleDisplay.innerText = '';
            
            localStorage.setItem('hub_music_enabled', 'false');
            currentRadioId = '';
            updateRadioButtonsUI();
        }

        function updateRadioButtonsUI() {
            ['kurdish', 'arabic', 'english'].forEach(id => {
                const btn = document.getElementById('btn-radio-' + id);
                if (btn) {
                    btn.classList.remove('radio-active', 'btn-primary');
                    btn.classList.add('btn-secondary');
                }
            });

            if (currentRadioId && isMusicPlaying) {
                const activeBtn = document.getElementById('btn-radio-' + currentRadioId);
                if (activeBtn) {
                    activeBtn.classList.remove('btn-secondary');
                    activeBtn.classList.add('btn-primary', 'radio-active');
                }
                const spectrumEl = document.getElementById('audio-spectrum');
                if (spectrumEl) spectrumEl.classList.add('music-playing-bars');
            }
        }

        window.addEventListener('click', () => {
            const savedMusicState = localStorage.getItem('hub_music_enabled');
            const savedRadioUrl = localStorage.getItem('hub_radio_url');
            const savedRadioId = localStorage.getItem('hub_radio_id');
            
            if (savedMusicState === 'true' && savedRadioUrl && !isMusicPlaying) {
                currentRadioId = savedRadioId;
                playRadio(savedRadioUrl, savedRadioId);
            }
        }, { once: true });

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            const titleEl = document.getElementById('auth-modal-title');
            const descEl = document.getElementById('auth-modal-desc');
            const submitBtn = document.getElementById('auth-primary-submit-btn');
            const toggleLink = document.getElementById('auth-toggle-mode-link');
            const avatarGroup = document.getElementById('avatar-select-group');

            if (isLoginMode) {
                titleEl.innerText = currentLang === 'ar' ? "تسجيل الدخول" : "Sign In";
                descEl.innerText = currentLang === 'ar' ? "أدخل اسم المستخدم وكلمة المرور للعودة لرصيدك المزامَن." : "Enter your username and password to log back into your profile.";
                submitBtn.innerText = currentLang === 'ar' ? "تسجيل الدخول" : "Sign In";
                toggleLink.innerText = currentLang === 'ar' ? "لا تملك حساباً؟ إنشاء حساب جديد" : "Don't have an account? Create one";
                avatarGroup.style.display = 'none'; 
            } else {
                titleEl.innerText = currentLang === 'ar' ? "إنشاء حساب" : "Create Account";
                descEl.innerText = translations[currentLang].login_desc;
                submitBtn.innerText = translations[currentLang].login_save;
                toggleLink.innerText = currentLang === 'ar' ? "امتلك حساباً بالفعل؟ تسجيل الدخول" : "Already have an account? Sign In";
                avatarGroup.style.display = 'block';
            }
        }

        function updateTranslations() {
            const t = translations[currentLang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.innerHTML = t[key];
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (t[key]) el.placeholder = t[key];
            });
            
            const toggleLink = document.getElementById('auth-toggle-mode-link');
            if(toggleLink) {
                if(isLoginMode) {
                    toggleLink.innerText = currentLang === 'ar' ? "لا تملك حساباً؟ إنشاء حساب جديد" : "Don't have an account? Create one";
                } else {
                    toggleLink.innerText = currentLang === 'ar' ? "امتلك حساباً بالفعل؟ تسجيل الدخول" : "Already have an account? Sign In";
                }
            }
            syncHubProfile(); 
        }

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('lang-toggle-btn').innerText = currentLang === 'ar' ? 'EN' : 'العربية';
            updateTranslations();

            const gameIframe = document.getElementById('game-frame');
            if (gameIframe && gameIframe.contentWindow) {
                gameIframe.contentWindow.postMessage({ 
                    type: 'LANGUAGE_CHANGED', 
                    lang: currentLang 
                }, '*');
            }
        }

        let customPopupCallback = null;

        function showCustomPopup(msg, isPrompt = false, defaultValue = "", showCancel = false, callback = null) {
            document.getElementById('custom-popup-modal').style.display = 'flex';
            document.getElementById('custom-popup-msg').innerText = msg;
            
            const inputContainer = document.getElementById('custom-popup-input-group');
            const inputEl = document.getElementById('custom-popup-input');
            const cancelBtn = document.getElementById('custom-popup-cancel');
            
            if (isPrompt) {
                inputContainer.style.display = 'block';
                inputEl.value = defaultValue;
                inputEl.focus();
                cancelBtn.style.display = 'block';
            } else {
                inputContainer.style.display = 'none';
                cancelBtn.style.display = showCancel ? 'block' : 'none';
            }
            
            document.getElementById('custom-popup-ok').innerHTML = translations[currentLang].btn_ok;
            cancelBtn.innerHTML = translations[currentLang].btn_cancel;

            customPopupCallback = callback;
        }

        function closeCustomPopup(isOk) {
            document.getElementById('custom-popup-modal').style.display = 'none';
            if (customPopupCallback) {
                const isPrompt = document.getElementById('custom-popup-input-group').style.display === 'block';
                const inputVal = document.getElementById('custom-popup-input').value;
                
                if (isPrompt) {
                    customPopupCallback(isOk ? inputVal : null);
                } else {
                    customPopupCallback(isOk);
                }
            }
        }

        document.getElementById('custom-popup-ok').addEventListener('click', () => closeCustomPopup(true));
        document.getElementById('custom-popup-cancel').addEventListener('click', () => closeCustomPopup(false));

        function triggerAlertSoon() { showCustomPopup(translations[currentLang].msg_soon); }

        function submitManualAuthForm() {
            const nameInput = document.getElementById('login-name-input').value.trim();
            const passInput = document.getElementById('login-password-input').value;
            const avatarSelect = document.getElementById('login-avatar-select').value;

            if (!nameInput) return showCustomPopup(translations[currentLang].msg_no_name);
            if (!passInput) return showCustomPopup(translations[currentLang].msg_no_pass);

            if (!socket || !socket.connected) {
                console.warn("⚠️ السوكيت غير متصل حالياً! جاري إعادة الاتصال تلقائياً...");
                showCustomPopup(currentLang === 'ar' ? "فشل الاتصال المؤقت بالسيرفر! جاري إعادة الاتصال، يرجى المحاولة مرة أخرى خلال ثوانٍ." : "Server connection lost! Reconnecting, please try again in a few seconds.");
                socket.connect(); 
                return;
            }

            if (isLoginMode) {
                socket.emit('login_manual', { username: nameInput, password: passInput });
            } else {
                socket.emit('register_manual', { username: nameInput, password: passInput, avatar: avatarSelect });
            }
        }

        window.addEventListener('load', () => {
            history.replaceState({ view: 'hub' }, '');
            updateTranslations();

            const splash = document.getElementById('splash-screen');
            setTimeout(() => {
                splash.style.opacity = '0';
                splash.style.visibility = 'hidden';
                setTimeout(() => { 
                    splash.style.display = 'none'; 
                    checkUserAuthentication(); 
                }, 800);
            }, 2000);
        });

        function checkUserAuthentication() {
            let globalProfile = localStorage.getItem('hub_user_profile');
            if (globalProfile) {
                try {
                    JSON.parse(globalProfile);
                    document.getElementById('login-modal').style.display = 'none';
                    document.getElementById('game-selector').style.display = 'flex';
                    syncHubProfile();
                } catch (e) {
                    console.error("⚠️ ملف التعريف مشوه ومخزن بشكل خاطئ، جاري إعادة الضبط:", e);
                    localStorage.removeItem('hub_user_profile');
                    document.getElementById('game-selector').style.display = 'none';
                    document.getElementById('login-modal').style.display = 'flex';
                }
            } else {
                document.getElementById('game-selector').style.display = 'none';
                document.getElementById('login-modal').style.display = 'flex';
            }
        }

        function loginAsGuest() {
            const randomId = "GUEST-" + Math.floor(100000 + Math.random() * 900000);
            const randomName = translations[currentLang].guest_name + Math.floor(1000 + Math.random() * 9000);
            
            const guestProfile = {
                id: randomId,
                name: randomName,
                avatar: '1000132081.webp',
                isCustomAvatar: false,
                tokens: 999999999, 
                gamesPlayed: 0, 
                wins: 0, 
                losses: 0, 
                friends: [],
                purchasedItems: [], 
                equippedBg: 'bg_wood', 
                equippedFr: 'fr_classic',
                equippedPc: 'pc_original'
            };

            try {
                localStorage.setItem('hub_user_profile', JSON.stringify(guestProfile));
                checkUserAuthentication();
            } catch (err) {
                console.error("⚠️ فشل في حفظ جلسة الزائر مؤقتاً:", err);
            }
        }

        // 🚀 المنظومة العبقرية الجديدة والمحصنة لإرسال الرابط الخام (النقي) وتخطي جدران حماية المتصفحات
        function syncHubProfile() {
            let globalProfile = localStorage.getItem('hub_user_profile');
            if (!globalProfile) return;
            
            const profile = getSafeProfile();
            const tokenVal = profile.tokens || 0;
            const tokenText = tokenVal + translations[currentLang].token_word;

            if (document.getElementById('hub-token-count')) document.getElementById('hub-token-count').innerText = tokenVal;
            if (document.getElementById('profile-stat-tokens')) document.getElementById('profile-stat-tokens').innerText = tokenText;
            if (document.getElementById('profile-display-name')) document.getElementById('profile-display-name').innerText = profile.name;
            if (document.getElementById('profile-display-id')) document.getElementById('profile-display-id').innerText = profile.id;
            
            // 1. تجهيز وصناعة رابط الصورة الكامل والنقي بدقة هنا في السيرفر الرئيسي للـ Hub
            let finalAvatarSrc = profile.avatar || '1000132081.webp';
            const isFullUrl = finalAvatarSrc.startsWith('http://') || finalAvatarSrc.startsWith('https://') || finalAvatarSrc.startsWith('data:image');
            if (!isFullUrl) {
                // تم تعديل المسار هنا فقط ليكون من المستودع المباشر في GitHub
                finalAvatarSrc = "https://raw.githubusercontent.com/diwanrise-hue/Kings-Challenge/main/" + finalAvatarSrc;
            }

            // 2. تحديث الحقول المحلية في الـ Hub نفسه
            const renderAvatarLocal = (elementId) => {
                const el = document.getElementById(elementId);
                if (el) el.innerHTML = `<img src="${finalAvatarSrc}" alt="Avatar" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block;">`;
            };
            renderAvatarLocal('hub-profile-avatar');
            renderAvatarLocal('profile-display-avatar');

            // 3. إرسال الرابط الخام النقي (بدون وسوم HTML المرفوضة حمايتها) إلى داخل الـ Iframe ليقوم ببناء صورته ذاتياً بامتياز
            const gameIframe = document.getElementById('game-frame');
            if (gameIframe && gameIframe.contentWindow) {
                gameIframe.contentWindow.postMessage({ 
                    type: 'INJECT_AVATAR_DIRECT', 
                    avatarHtml: finalAvatarSrc // 👈 إرسال الرابط الخام فقط لتأمين وسهولة الاختراق الأمني
                }, '*');

                gameIframe.contentWindow.postMessage({ 
                    type: 'PROFILE_UPDATED', 
                    profile: profile 
                }, '*');
            }

            const linkFbBtn = document.getElementById('link-facebook-guest-btn');
            if (linkFbBtn) {
                linkFbBtn.style.display = (profile.id && !profile.id.startsWith('FB-')) ? 'flex' : 'none';
            }
        }

        function changePlayerName() {
            let profile = getSafeProfile();
            if(!profile) return;
            
            showCustomPopup(translations[currentLang].msg_prompt_name, true, profile.name, true, (newName) => {
                if (newName && newName.trim() !== "") {
                    profile.name = newName.trim();
                    try {
                        localStorage.setItem('hub_user_profile', JSON.stringify(profile));
                        syncHubProfile();
                    } catch (err) { }
                }
            });
        }

        function changeAvatarFromDropdown(val) {
            if(!val) return;
            let profile = getSafeProfile();
            profile.avatar = val;
            profile.isCustomAvatar = false; 
            try {
                localStorage.setItem('hub_user_profile', JSON.stringify(profile));
                syncHubProfile();
                document.getElementById('edit-avatar-select').selectedIndex = 0; 
                showCustomPopup(translations[currentLang].msg_avatar_success);
            } catch (err) { }
        }

        function uploadImageFromPhone(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const maxDim = 180;
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > height) {
                            if (width > maxDim) { height = Math.round((height * maxDim) / width); width = maxDim; }
                        } else {
                            if (height > maxDim) { height = Math.round((width * maxDim) / height); height = maxDim; }
                        }
                        
                        canvas.width = width; canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                        
                        let profile = getSafeProfile();
                        profile.avatar = compressedDataUrl;
                        profile.isCustomAvatar = true; 
                        
                        try {
                            localStorage.setItem('hub_user_profile', JSON.stringify(profile));
                            syncHubProfile();
                            showCustomPopup(translations[currentLang].msg_img_success);
                        } catch (error) { }
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function copyPlayerID() {
            const idText = document.getElementById('profile-display-id').innerText;
            if(navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(idText).then(() => {
                    showCustomPopup(translations[currentLang].msg_copy_success + idText);
                }).catch((err) => { fallbackCopyText(idText); });
            } else { fallbackCopyText(idText); }
        }

        function fallbackCopyText(text) {
            let textArea = document.createElement("textarea");
            textArea.value = text; document.body.appendChild(textArea);
            textArea.focus(); textArea.select();
            try {
                document.execCommand('copy');
                showCustomPopup(translations[currentLang].msg_copy_success + text);
            } catch (err) { showCustomPopup(translations[currentLang].msg_copy_fail); }
            document.body.removeChild(textArea);
        }

        function openProfileModal() { 
            syncHubProfile();
            document.getElementById('profile-modal').style.display = 'flex'; 
            history.pushState({ view: 'profile' }, '');
        }
        
        function closeProfileModal() { 
            if (history.state && history.state.view === 'profile') { history.back(); } 
            else { document.getElementById('profile-modal').style.display = 'none'; }
        }

        function startGame() {
            document.getElementById('game-selector').style.display = 'none';
            document.getElementById('game-interface').style.display = 'block';
            const gameFrame = document.getElementById('game-frame');
            gameFrame.src = 'dama/dama.html';
            history.pushState({ view: 'game' }, '');
            
            // 🚀 حقن آمن وفوري للرابط بمجرد الإقلاع المباشر للـ iframe
            gameFrame.onload = function() {
                syncHubProfile();
            };
        }
        
        function exitGame() {
            document.getElementById('game-interface').style.display = 'none';
            if(localStorage.getItem('hub_user_profile')) { document.getElementById('game-selector').style.display = 'flex'; }
            setTimeout(() => { document.getElementById('game-frame').src = ''; }, 300);
            history.pushState({ view: 'hub' }, '');
            syncHubProfile();
        }

        window.addEventListener('popstate', function(e) {
            if (document.getElementById('custom-popup-modal').style.display === 'flex') document.getElementById('custom-popup-modal').style.display = 'none';
            if (document.getElementById('profile-modal').style.display === 'flex') document.getElementById('profile-modal').style.display = 'none';
            if (document.getElementById('radio-modal').style.display === 'flex') document.getElementById('radio-modal').style.display = 'none';
            
            if (document.getElementById('game-interface').style.display === 'block') {
                if (e.state && e.state.view === 'hub') {
                    document.getElementById('game-interface').style.display = 'none';
                    if(localStorage.getItem('hub_user_profile')) document.getElementById('game-selector').style.display = 'flex';
                    setTimeout(() => { document.getElementById('game-frame').src = ''; }, 300);
                    syncHubProfile();
                }
            }
        });

        function handleAccountExit(isSwitching) {
            const profileRaw = localStorage.getItem('hub_user_profile');
            if (!profileRaw) return;
            let profile;
            try { profile = JSON.parse(profileRaw); } catch (e) { profile = getSafeProfile(); }
            const isGuest = profile.id && profile.id.startsWith('GUEST-');

            if (!isGuest) { executeLogout(isSwitching); } 
            else {
                showCustomPopup(translations[currentLang].msg_logout_confirm, false, "", true, (res) => {
                    if (res) { socket.emit('logout_guest_clean', { id: profile.id }); executeLogout(isSwitching); }
                });
            }
        }

        function executeLogout(isSwitching) {
            const profileRaw = localStorage.getItem('hub_user_profile');
            let isFacebookUser = false;
            if (profileRaw) {
                try { isFacebookUser = JSON.parse(profileRaw).id?.startsWith('FB-'); } catch(e) {}
            }

            localStorage.removeItem('hub_user_profile');
            document.getElementById('profile-modal').style.display = 'none';
            checkUserAuthentication();

            if (isFacebookUser && typeof FB !== 'undefined') {
                FB.getLoginStatus(function(response) {
                    if (response.status === 'connected') { FB.logout(function() { location.reload(); }); } 
                    else { location.reload(); }
                });
            } else { location.reload(); }
        }

        function triggerLogout() { handleAccountExit(false); }

        window.syncHubProfile = syncHubProfile;
        window.exitGame = exitGame; 
    </script>
</body>
